plugins {
    id 'com.android.application'
}

android {
    compileSdk 34
    namespace 'com.jjuarez.djsetlist'

    defaultConfig {
        applicationId "com.jjuarez.djsetlist"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.webkit:webkit:1.8.0'
}
